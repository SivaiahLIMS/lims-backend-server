server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: lims
  datasource:
    url: jdbc:postgresql://localhost:5432/lims
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: "3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b"
    expiration-ms: 86400000   # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  security:
    max-failed-attempts: 3
    lock-duration-months: 1   # months of inactivity triggers lock

logging:
  level:
    com.sivayahealth: DEBUG
    org.springframework.security: INFO
